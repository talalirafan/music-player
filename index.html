<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav>
<button id="menuBtn">☰</button>
<div style="display:flex; align-items:center; gap:15px;">
<img src="https://img.icons8.com/fluency/48/000000/spotify.png" alt="Spotify Logo" style="width:40px; height:40px;">
<h2>Spotify</h2>
</div>
<span class="navlink" style="cursor:pointer; transition:all 0.3s ease;" onmouseover="this.style.color='#00d4ff'" onmouseout="this.style.color='white'">Home</span>
<span class="navlink" style="cursor:pointer; transition:all 0.3s ease;" onmouseover="this.style.color='#00d4ff'" onmouseout="this.style.color='white'">Library</span>
<span id="searchBtn" style="cursor:pointer; transition:all 0.3s ease; font-size:20px;">🔍</span>

</nav>

<div class="container">

<div class="left">

<h1 style="background:linear-gradient(135deg,#00d4ff,#0099cc); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:36px; margin-bottom:30px; text-shadow:0 0 30px rgba(0,212,255,0.5);"></h1>

<input id="search" placeholder="🔍 Search song...">

<div id="songList"></div>

</div>

<div class="right">

<img id="album" class="album" alt="Album Cover" src="">

</img>

</div>

<div class="bottom">

<input type="range" id="progress" value="0">

<div class="controls">

<button id="shuffle">🔀</button>
<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>
<button id="repeat">🔁</button>

<div class="equalizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<input type="range" id="volume" min="0" max="1" step="0.01">

</div>

<div id="songName" style="font-size:18px; font-weight:600; margin-top:10px; color:#00d4ff; text-shadow:0 0 10px rgba(0,212,255,0.5);">
Ready <span id="time" style="margin-left:15px;font-size:14px;color:#00d4ff;"></span>
</div>

</div>

<script>

/* SONG DATA */

},

{

cover: defaultCover,

{

cover: defaultCover,
artist:"Dua Lipa",
duration:"3:23"
},

{
name:"Good 4 U",

cover: defaultCover,
artist:"Olivia Rodrigo",
duration:"2:58"
},

{
name:"Stay",

cover: defaultCover,
artist:"The Kid Laroi & Justin Bieber",
duration:"2:21"
},

{
name:"Peaches",
file:"songs/placeholder7.mp3",
cover: defaultCover,
artist:"Justin Bieber ft. Daniel Caesar & Giveon",
duration:"3:18"
},

{
name:"Montero (Call Me By Your Name)",
file:"songs/placeholder8.mp3",
cover: defaultCover,
artist:"Lil Nas X",

},

{
name:"Permission to Dance",

cover: defaultCover,
artist:"BTS",
duration:"3:07"
},

{
name:"Butter",
file:"songs/placeholder10.mp3",
cover: defaultCover,
artist:"BTS",
duration:"2:44"
}

];


/* VARIABLES */

let index=0;

let audio=new Audio(songs[0].file);

const songList=document.getElementById("songList");

const playBtn=document.getElementById("play");

const prevBtn=document.getElementById("prev");

const nextBtn=document.getElementById("next");

const progress=document.getElementById("progress");

const volume=document.getElementById("volume");

const songName=document.getElementById("songName");

const search=document.getElementById("search");

const album=document.getElementById("album");

const bars=document.querySelectorAll(".bar");

const nav=document.querySelector('nav');
const menuBtn=document.getElementById('menuBtn');
const searchBtn=document.getElementById('searchBtn');
const shuffleBtn=document.getElementById("shuffle");
const repeatBtn=document.getElementById("repeat");
const timeDisplay=document.getElementById("time");
let isShuffle=false;
let isRepeat=false;

menuBtn.onclick = ()=> nav.classList.toggle('open');
searchBtn?.addEventListener('click',()=>document.body.classList.toggle('search-active'));

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

// note: 8D audio/panning code removed for simplicity

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}


/* BUILD SONG LIST */

function buildList(list=songs){

songList.innerHTML="";

list.forEach((song,i)=>{

let div=document.createElement("div");

div.className="songItem";

if(song.name === "Add Your Song Here"){
div.classList.add("empty-song");
}

div.innerHTML=`

<div class="songInfo">

<img src="${song.cover}" onerror="this.src=defaultCover">
<div class="songDetails">
<div class="songTitle">${song.name}</div>
<div class="songArtist">${song.artist || 'Unknown Artist'}</div>
</div>

</div>

<div style="display:flex; align-items:center; gap:10px;">
<span style="color:#ff6b6b; font-size:14px;">${song.duration || '0:00'}</span>
<span style="color:#ff6b6b; font-size:18px;">▶</span>
</div>

`;

div.onclick=()=>playSong(i);

songList.appendChild(div);

});

}

buildList();


/* PLAY SONG */

function playSong(i){

if(songs[i].name === "Add Your Song Here"){
alert("📝 To add your own songs:\n\n1. Add your MP3 files to the 'songs/' folder\n2. Add cover images to the 'covers/' folder\n3. Edit the songs array in the JavaScript code\n4. Replace the placeholder data with your song details\n\nExample:\n{\n  name: \"Your Song Name\",\n  file: \"songs/your-song.mp3\",\n  cover: \"covers/your-cover.jpg\",\n  artist: \"Artist Name\",\n  duration: \"3:45\"\n}\n");
return;
}

index=i;

audio.src=songs[i].file;

audio.play();

playBtn.textContent="⏸";

songName.textContent=`${songs[i].name} - ${songs[i].artist || 'Unknown Artist'}`;

album.src=songs[i].cover;
album.classList.add('playing');

bars.forEach(b=>b.style.animationPlayState="running");

document.querySelectorAll('.songItem').forEach((el,idx)=>el.classList.toggle('active', idx===i));

}


/* PLAY PAUSE */

playBtn.onclick=()=>{

if(audio.paused){

audio.play();

playBtn.textContent="⏸";

bars.forEach(b=>b.style.animationPlayState="running");
album.classList.add('playing');

}

else{

audio.pause();

playBtn.textContent="▶";

bars.forEach(b=>b.style.animationPlayState="paused");
album.classList.remove('playing');

}

};


/* NEXT */

nextBtn.onclick=()=>{
  if(isShuffle){
    index=Math.floor(Math.random()*songs.length);
  } else {
    index=(index+1)%songs.length;
  }
  playSong(index);
};

shuffleBtn.onclick=()=>{
  isShuffle=!isShuffle;
  shuffleBtn.style.color=isShuffle?'#00d4ff':'white';
  shuffleBtn.style.textShadow=isShuffle?'0 0 10px rgba(0,212,255,0.6)':'none';
};

repeatBtn.onclick=()=>{
  isRepeat=!isRepeat;
  repeatBtn.style.color=isRepeat?'#00d4ff':'white';
  repeatBtn.style.textShadow=isRepeat?'0 0 10px rgba(0,212,255,0.6)':'none';
};




/* PREV */

prevBtn.onclick=()=>{
  if(isShuffle){
    index=Math.floor(Math.random()*songs.length);
  } else {
    index=(index-1+songs.length)%songs.length;
  }
  playSong(index);
};


/* PROGRESS */

audio.ontimeupdate=()=>{
  if(audio.duration){
    progress.value=(audio.currentTime/audio.duration)*100;
    timeDisplay.textContent=`${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
  }
};


progress.oninput=()=>{

audio.currentTime=(progress.value*audio.duration)/100;

};


/* VOLUME */

volume.oninput=()=>{

audio.volume=volume.value;

};


/* AUTO NEXT */

audio.onended=()=>{
  if(isRepeat){
    audio.currentTime=0;
    audio.play();
  } else if(isShuffle){
    index=Math.floor(Math.random()*songs.length);
    playSong(index);
  } else {
    nextBtn.click();
  }
};


/* SEARCH */

search.oninput=()=>{

let value=search.value.toLowerCase();

let filtered=songs.filter(song=>

song.name.toLowerCase().includes(value)

);

buildList(filtered);

};

</script>

</body>
</html>
